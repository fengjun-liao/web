<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>錯誤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Sans TC", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .page-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 2px solid #f44336;
        }
        
        .site-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .owner-info {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
        
        .student-id {
            font-size: 0.9rem;
            color: #f44336;
        }
        
        main {
            flex: 1;
            padding: 2rem;
            max-width: 600px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-box {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-left: 4px solid #f44336;
        }
        
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 1.5rem;
            color: #f44336;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .back-link {
            display: inline-block;
            padding: 0.7rem 1.5rem;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header>
            <div class="site-title">錯誤</div>
            <div class="owner-info">名字: {{ name }}</div>
            <div class="student-id">座號: {{ student_id }}</div>
        </header>
        
        <main>
            <div class="error-box">
                <div class="error-icon">⚠️</div>
                <div class="error-title">發生錯誤</div>
                <div class="error-message">{{ error }}</div>
                <a href="{% url 'index' %}" class="back-link">返回首頁</a>
            </div>
        </main>
    </div>
</body>
</html>
