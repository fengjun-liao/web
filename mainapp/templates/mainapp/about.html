<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f6f8fa;
        color: #222;
      }
      header {
        background: #004e89;
        color: white;
        padding: 1.5rem;
        text-align: center;
      }
      main {
        max-width: 720px;
        margin: 2rem auto;
        padding: 1rem;
        background: white;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      }
      a {
        color: #004e89;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>{{ heading }}</h1>
    </header>
    <main>
      <p>{{ message }}</p>
      <p>
        <a href="{% url 'index' %}">Back to home</a>
      </p>
    </main>
  </body>
</html>
